# codemagic.yaml

workflows:
  macos-desktop-build:
    name: 构建 macOS 桌面应用
    instance_type: mac_mini_m1 # 必须使用 macOS 环境
    environment:
      flutter: stable
      xcode: latest

    triggering:
      events:
        - push
        - tag
        - pull_request

    scripts:
      - name: 启用 macOS 桌面支持
        script: flutter config --enable-macos-desktop

      - name: 获取依赖
        script: flutter pub get

      - name: 构建 macOS Release 版本
        script: flutter build macos --release

    artifacts:
      # 指定 Codemagic 归档 build 目录下的 macos 产物
      # 这样你就可以在 Codemagic 页面下载到一个包含 .app 的压缩包
      - build/macos/Build/Products/Release/*.app
