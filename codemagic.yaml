workflows:
  macos-workflow:
    name: macOS Build
    instance_type: mac_mini_m2
    environment:
      flutter: 3.19.0          # 锁定稳定版，不使用 latest
      xcode: 14.2               # 【关键】macOS12 唯一兼容的 Xcode 版本
    scripts:
      - name: Enable macOS
        script: |
          flutter config --enable-macos-desktop
      - name: Get packages
        script: flutter pub get
      - name: Build macOS
        script: |
          # 【关键】禁用 Impeller + 不签名（测试用）
          flutter build macos --release --disable-impeller --no-codesign
      - name: Zip app
        script: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks Test47.zip Test47.app
    artifacts:
      - build/macos/Build/Products/Release/Test47.zip