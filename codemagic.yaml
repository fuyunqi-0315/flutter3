workflows:
  build-ios-test:
    name: Build iOS for testing
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
      - name: Create archive and ipa
        script: |
          cd build/ios
          mkdir -p Payload
          cp -R Release-iphoneos/Runner.app Payload/Runner.app
          zip -r Runner.ipa Payload
          mv Runner.ipa ../../
    artifacts:
      - Runner.ipa
