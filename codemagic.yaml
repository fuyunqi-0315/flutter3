workflows:
  macos-workflow:
    name: macOS Sonoma Build
    # M2 机器构建速度最快，且完美适配你的 macOS 14 虚拟机
    instance_type: mac_mini_m2

    environment:
      # 使用稳定的 Flutter 版本
      flutter: stable
      # 不指定 Xcode 版本，自动使用 macOS 14 上最新的 Xcode (15 或 16)
      vars:
        FLUTTER_ENABLE_MACOS: "true"

    scripts:
      - name: 清理旧缓存
        script: |
          flutter clean
          rm -rf build/
          rm -rf macos/Pods/
          rm -rf macos/.symlinks/

      - name: 开启 macOS 支持
        script: flutter config --enable-macos-desktop

      - name: 获取依赖
        script: flutter pub get

      - name: 构建 Release 版本
        script: flutter build macos --release

    # 只保留 artifacts，告诉 Codemagic 构建完后把文件保留下来供下载
    artifacts:
      - build/macos/Build/Products/Release/*.app
