workflows:
  macos-workflow:
    name: macOS Build
    instance_type: mac_mini_m2  # 保留你当前可用的实例
    environment:
      flutter: 3.24.5  # 锁定稳定版，兼容 macOS 12
      xcode: 15.4      # Apple Silicon 支持的最低稳定版，兼容 macOS 12
    scripts:
      - name: Enable macOS
        script: |
          flutter config --enable-macos-desktop
      - name: Get packages
        script: flutter pub get
      - name: Build macOS (解决白屏核心)
        script: |
          # 1. 强制禁用 Impeller 渲染引擎（macOS 12 白屏的根本原因）
          # 2. 测试用跳过签名，避免权限问题
          flutter build macos --release --disable-impeller --no-codesign
      - name: Zip app
        script: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks Test47.zip Test47.app
    artifacts:
      - build/macos/Build/Products/Release/Test47.zip