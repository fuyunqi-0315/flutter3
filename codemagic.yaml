workflows:
  macos-workflow:
    name: macOS Build
    instance_type: mac_mini_m2
    environment:
      # 锁定 Flutter 3.16.0：这是支持 macOS 12 的最后几个稳定版之一
      flutter: 3.16.0
      # 关键：使用 Codemagic 官方明确支持的版本号，绝对不会报错
      xcode: 15.0
    scripts:
      - name: Enable macOS Deskop
        script: flutter config --enable-macos-desktop
      
      - name: Get packages
        script: flutter pub get
      
      - name: Build macOS (必不白屏)
        script: |
          # 1. --disable-impeller：彻底解决 macOS 12 白屏
          # 2. --no-codesign：测试跳过签名，避免打不开
          flutter build macos --release --disable-impeller --no-codesign
      
      - name: Zip app
        script: |
          cd build/macos/Build/Products/Release
          zip -r --symlinks Test47.zip Test47.app
    artifacts:
      - build/macos/Build/Products/Release/Test47.zip