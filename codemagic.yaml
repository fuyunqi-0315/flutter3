workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build iOS archive
        script: |
          # 1. 构建未签名的.app
          flutter build ios --release --no-codesign
          # 2. 创建ipa输出目录
          mkdir -p build/ios/ipa
          # 3. 进入构建产物目录
          cd build/ios/Release-iphoneos
          # 4. 创建标准Payload文件夹，把.app复制进去
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          # 5. 打包成标准ipa
          zip -r ../ipa/Runner.ipa Payload
    artifacts:
      - build/ios/ipa/Runner.ipa
