workflows:
  macos-release:
    name: macOS Release (Un-signed)
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      flutter: stable
    scripts:
      - name: Flutter Build
        # 核心：使用 --no-codesign 告诉系统不要签名
        script: flutter build macos --release --no-codesign
    artifacts:
      # 把整个 App 包打包成 zip，方便 Windows 下载
      - build/macos/Build/Products/Release/Runner.app.zip
