workflows:
  macos-workflow:
    name: macOS Build
    instance_type: mac_mini_m2

    environment:
      flutter: 3.16.9
      # 修改点：使用 14.3.1，这是 M2 机器上可能存在的最后一个旧版 Xcode
      xcode: 14.3.1
      vars:
        FLUTTER_ENABLE_MACOS: "true"

    scripts:
      - name: Clean up
        script: |
          rm -rf build/
          rm -rf macos/Pods/
          rm -rf macos/.symlinks/
          flutter clean

      - name: Enable macOS
        script: flutter config --enable-macos-desktop

      - name: Get Packages
        script: flutter pub get

      - name: Build macOS
        # 关键构建命令
        script: flutter build macos --release

    artifacts:
      # 只保留这一项，确保你能下载到App
      - build/macos/Build/Products/Release/*.app
