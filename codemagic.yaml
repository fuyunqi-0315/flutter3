workflows:
  macos-workflow:
    name: macOS Build
    # 修改点 1：将实例类型从 mac_mini_m2 改为 mac_mini_m1
    instance_type: mac_mini_m1
    environment:
      flutter: 3.16.9
      # 修改点 2：指定一个在 macOS 12 上非常稳定的 Xcode 版本
      # Xcode 14.2 是支持 macOS 12 的最后一个主要版本，非常稳
      xcode: 14.2.0
    scripts:
      - name: Enable macOS Desktop
        script: flutter config --enable-macos-desktop
      
      - name: Get packages
        script: flutter pub get
      
      - name: Build macOS
        script: |
          # 保持你的构建参数不变
          flutter build macos --release --disable-impeller --no-codesign --macos-deployment-target=10.15
      
      # ... 后面的保持不变 ...