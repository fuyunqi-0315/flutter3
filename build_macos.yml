name: Flutter macOS Build

on:
  push:
    branches: [ "main", "master" ] # 当推送到 main 或 master 分支时触发
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-macos:
    runs-on: macos-14 # 强制使用 macOS 14 运行器，完美适配你的虚拟机
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Flutter 环境
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # 使用最新的稳定版 Flutter
          channel: 'stable'

      - name: 获取依赖
        run: flutter pub get

      - name: 启用 macOS 桌面支持
        run: flutter config --enable-macos-desktop

      - name: 构建 macOS Release 版本
        run: flutter build macos --release

      - name: 压缩 App 文件 (方便下载)
        run: |
          cd build/macos/Build/Products/Release/
          # 将 Runner.app 压缩为 zip，方便在 GitHub 上下载
          zip -r Runner.app.zip Runner.app

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/Runner.app.zip