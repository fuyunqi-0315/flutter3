name: Build macOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动点击打包

jobs:
  build:
    runs-on: macos-latest # 用 GitHub 免费 Mac 环境
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: stable # 最新稳定版

      - name: 安装依赖
        run: flutter pub get

      - name: 打包 macOS Release
        run: flutter build macos --release

      - name: 压缩成单文件 zip
        run: |
          cd build/macos/Build/Products/Release
          zip -r test47.zip test47.app

      - name: 上传打包结果
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App
          path: build/macos/Build/Products/Release/*.zip
